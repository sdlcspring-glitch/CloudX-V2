name: Build Plugins

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Cloudstream plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build plugin packages and repository index
        run: ./gradlew makePluginsJson --no-daemon

      - name: Prepare repository files
        run: |
          set -euo pipefail
          mkdir -p publish
          REPOSITORY="${GITHUB_REPOSITORY:-Asm0d3usX/CloudX-V2}"
          RAW_BASE="https://raw.githubusercontent.com/${REPOSITORY}/builds"
          cat > publish/repo.json <<EOF
          { "name": "CloudX", "description": " Indonesian Movie Repository for CloudStream", "iconUrl": "https://i.ibb.co/q3YkdNRv/asm0d3usx.png", "manifestVersion": 1, "pluginLists": [ "${RAW_BASE}/plugins.json" ] }
          EOF
          cp build/plugins.json publish/plugins.json
          cp build/plugins.json publish/plugin.json
          find . -maxdepth 3 -path "*/build/*.cs3" -exec cp {} publish/ \;
          find . -maxdepth 3 -path "*/build/*.jar" -exec cp {} publish/ \;

      - name: Upload plugin packages
        uses: actions/upload-artifact@v4
        with:
          name: cloudstream-plugins
          path: publish/*
          if-no-files-found: error

      - name: Publish repository
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./publish
          force_orphan: true
